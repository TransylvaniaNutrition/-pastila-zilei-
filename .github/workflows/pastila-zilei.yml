name: Pastila Zilei

on:
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * 1-5"
    
permissions:
  contents: read
  id-token: write

jobs:
  generate-and-send:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate article with Claude
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Alege primul subiect din topics.txt si scrie un email HTML "Pastila zilei" despre el.

            Structura simpla:
            - Ce este
            - Istorie scurta
            - Cum functioneaza
            - Cum se foloseste
            - Contraindicatii
            - 3 tips

            Returneaza DOAR HTML complet pentru email, fara alte explicatii.
          claude_args: |
            --max-turns 8


      - name: Save Claude output
        run: |
          cat <<'EOF' > output-email.html
          ${{ steps.claude.outputs.response }}
          EOF

      - name: Send email with Resend
        run: |
          jq -n \
            --arg from "Pastila Zilei <office@transylvanianutrition.com>" \
            --arg to1 "${{ secrets.EMAIL_TO_1 }}" \
            --arg subject "Pastila zilei" \
            --rawfile html output-email.html \
            '{from:$from,to:[$to1],subject:$subject,html:$html}' > payload.json

          curl -s -X POST https://api.resend.com/emails \
            -H "Authorization: Bearer ${{ secrets.RESEND_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d @payload.json | tee resend-response.json
