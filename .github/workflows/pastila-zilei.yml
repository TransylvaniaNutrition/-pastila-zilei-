name: Pastila Zilei

on:
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * 1-5"

permissions:
  contents: read
  id-token: write

jobs:
  generate-and-send:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate article with Claude
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Alege primul subiect din topics.txt.

            Scrie in limba romana un email HTML complet, cu titlul "Pastila zilei".

            Structura simpla:
            - Ce este
            - Istorie scurta
            - Cum functioneaza
            - Cum se foloseste
            - Contraindicatii
            - 3 tips

            Returneaza raspunsul ca JSON cu cheia "html".
          claude_args: |
            --max-turns 8
            --json-schema '{"type":"object","properties":{"html":{"type":"string"}},"required":["html"]}'

      - name: Save Claude output
        env:
          CLAUDE_JSON: ${{ steps.claude.outputs.structured_output }}
        run: |
          python3 - <<'PY'
          import os, json
          raw = os.environ.get("CLAUDE_JSON", "").strip()
          if not raw:
              raise SystemExit("structured_output este gol")
          data = json.loads(raw)
          html = data.get("html", "").strip()
          if not html:
              raise SystemExit("Campul html este gol")
          with open("output-email.html", "w", encoding="utf-8") as f:
              f.write(html)
          PY

      - name: Check generated HTML
        run: |
          test -f output-email.html || (echo "output-email.html lipseste" && exit 1)
          test -s output-email.html || (echo "output-email.html este gol" && exit 1)
          ls -l output-email.html
          wc -c output-email.html
          head -n 20 output-email.html

      - name: Send email with Resend
        run: |
          jq -n \
            --arg from "Pastila Zilei <office@transylvanianutrition.com>" \
            --arg to1 "${{ secrets.EMAIL_TO_1 }}" \
            --arg to2 "${{ secrets.EMAIL_TO_2 }}" \
            --arg to3 "${{ secrets.EMAIL_TO_3 }}" \
            --arg subject "Pastila zilei" \
            --rawfile html output-email.html \
            '{from:$from,to:[$to1,$to2,$to3],subject:$subject,html:$html}' > payload.json

          curl -s -X POST https://api.resend.com/emails \
            -H "Authorization: Bearer ${{ secrets.RESEND_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d @payload.json | tee resend-response.json
