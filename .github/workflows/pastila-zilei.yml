name: Pastila Zilei Test

on:
  workflow_dispatch:

jobs:
  send-test-email:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create test email
        run: |
          cat > email.html <<'EOF'
          <html>
            <body style="font-family: Arial, sans-serif; line-height: 1.6;">
              <h1>Pastila Zilei - TEST</h1>
              <p>Salut!</p>
              <p>Daca primesti acest email, inseamna ca GitHub Actions + Resend functioneaza corect.</p>
            </body>
          </html>
          EOF

      - name: Send email with Resend
        run: |
          jq -n \
            --arg from "Pastila Zilei <onboarding@resend.dev>" \
            --arg to "${{ secrets.EMAIL_TO_1 }}" \
            --arg subject "Pastila Zilei - TEST" \
            --arg html "$(cat email.html)" \
            '{from:$from,to:[$to],subject:$subject,html:$html}' > payload.json

          curl -s -X POST https://api.resend.com/emails \
            -H "Authorization: Bearer ${{ secrets.RESEND_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d @payload.json | tee resend-response.json

