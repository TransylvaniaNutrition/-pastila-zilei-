name: Pastila Zilei

on:
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * 1-5"

jobs:
  generate-and-send:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate article with Claude
        id: claude
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Scrie in limba romana un email cu titlul "Pastila zilei".

            Alege un subiect din fisierul topics.txt.

            Emailul trebuie sa fie foarte clar, foarte usor de inteles, ca pentru un om obisnuit.
            Tonul trebuie sa fie cald, profesionist si usor de dat mai departe colegilor sau clientilor.

            Structura emailului trebuie sa fie:
            1. Ce este
            2. Istorie si cum a aparut
            3. Impact si de ce a devenit popular
            4. Cum functioneaza
            5. Cum se foloseste
            6. Cand este util
            7. Contraindicatii si atentionari
            8. Tips & Tricks
            9. 3 lucruri importante de retinut

            Scrie in format HTML simplu, frumos, lizibil pentru email.

            Salveaza rezultatul in fisierul output-email.html

      - name: Save Claude output
        run: |
          echo '${{ steps.claude.outputs.response }}' > output-email.html

      - name: Send email with Resend
        run: |
          curl -X POST https://api.resend.com/emails \
            -H "Authorization: Bearer ${{ secrets.RESEND_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{
              "from": "Pastila Zilei <onboarding@resend.dev>",
              "to": [
                "${{ secrets.EMAIL_TO_1 }}",
                "${{ secrets.EMAIL_TO_2 }}",
                "${{ secrets.EMAIL_TO_3 }}"
              ],
              "subject": "Pastila zilei",
              "html": '"$(jq -Rs . < output-email.html)"'
            }'
